name: Deploy to Azure App Service

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_PACKAGE_PATH: "."
  NODE_VERSION: "22.x"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for Azure
        run: npm run build:azure
        env:
          # ---------------------------------------------------------------
          # These environment variables must be set in GitHub repository
          # secrets (Settings > Secrets and variables > Actions):
          #
          #   DATABASE_URL              - PostgreSQL connection string
          #   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
          #   CLERK_SECRET_KEY
          #   ANTHROPIC_API_KEY
          #   STRIPE_SECRET_KEY
          #   STRIPE_WEBHOOK_SECRET
          #   RESEND_API_KEY
          #   AZURE_STORAGE_CONNECTION_STRING
          #   REDIS_URL
          #   NEXT_PUBLIC_APP_URL
          # ---------------------------------------------------------------
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kairos-app-build
          path: |
            .next/
            public/
            server.js
            web.config
            package.json
            package-lock.json
            next.config.*
            .deployment
          retention-days: 1

  deploy-staging:
    name: Deploy to Staging Slot
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://${{ secrets.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: kairos-app-build

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          slot-name: staging
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy-production:
    name: Swap Staging to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap staging slot to production
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp deployment slot swap \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ secrets.AZURE_WEBAPP_NAME }} \
              --slot staging \
              --target-slot production
